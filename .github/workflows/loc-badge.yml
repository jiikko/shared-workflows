name: Update LOC Badge

on:
  workflow_dispatch:
    inputs:
      source_dir:
        description: 'Directory to count lines in'
        required: false
        type: string
        default: 'src'
      badge_path:
        description: 'Output path for the SVG badge'
        required: false
        type: string
        default: 'docs/loc-badge.svg'
  workflow_call:
    inputs:
      source_dir:
        description: 'Directory to count lines in'
        required: false
        type: string
        default: 'src'
      badge_path:
        description: 'Output path for the SVG badge'
        required: false
        type: string
        default: 'docs/loc-badge.svg'

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get update && sudo apt-get install -y cloc python3

      - name: Checkout shared-workflows scripts
        uses: actions/checkout@v4
        with:
          repository: jiikko/shared-workflows
          path: .shared-workflows
          sparse-checkout: scripts

      - name: Generate LOC badge
        run: bash .shared-workflows/scripts/generate-loc-badge.sh "${{ inputs.source_dir }}" "${{ inputs.badge_path }}"

      - name: Clean up
        run: rm -rf .shared-workflows

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.badge_path }}"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update LOC badge"
          git push
